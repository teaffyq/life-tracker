<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC;
    --surface: #FDFAF5;
    --border: #D8D2C4;
    --text: #1C1A16;
    --muted: #7A7568;
    --work: #C44B2B;
    --work-bg: #FBF0EC;
    --work-border: #E8C0B2;
    --masters: #4A46A8;
    --masters-bg: #EEEDF9;
    --masters-border: #C4C2E8;
    --reno: #A06B10;
    --reno-bg: #FBF3E3;
    --reno-border: #E8D4A0;
    --wedding: #B03070;
    --wedding-bg: #F9EBF3;
    --wedding-border: #E8B8D4;
    --done-bg: #F0F0EE;
    --done-text: #A8A49C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.15rem;
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    width: fit-content;
  }

  .tab-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.15s;
  }

  .tab-btn.active {
    background: var(--text);
    color: var(--bg);
  }

  /* ADD TASK FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    align-items: end;
  }

  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

  input[type="text"], input[type="date"], select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: var(--text);
  }

  .lane-select { min-width: 120px; }
  .date-input { min-width: 140px; }

  .add-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    height: 36px;
  }

  .add-btn:hover { opacity: 0.8; }

  /* WEEK VIEW */
  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .week-nav button {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
  }

  .week-nav button:hover { background: var(--border); }

  .week-label {
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .week-summary {
    display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap;
  }

  .lane-pill {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    font-weight: 500;
    border: 1px solid;
  }

  .pill-work { background: var(--work-bg); color: var(--work); border-color: var(--work-border); }
  .pill-masters { background: var(--masters-bg); color: var(--masters); border-color: var(--masters-border); }
  .pill-reno { background: var(--reno-bg); color: var(--reno); border-color: var(--reno-border); }
  .pill-wedding { background: var(--wedding-bg); color: var(--wedding); border-color: var(--wedding-border); }

  /* TASK CARD */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.2s;
    position: relative;
    overflow: hidden;
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .task-card.work::before { background: var(--work); }
  .task-card.masters::before { background: var(--masters); }
  .task-card.reno::before { background: var(--reno); }
  .task-card.wedding::before { background: var(--wedding); }

  .task-card.done { opacity: 0.5; }

  .task-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .task-check:hover { border-color: var(--text); }
  .task-check.checked { background: var(--text); border-color: var(--text); }
  .task-check.checked::after { content: '✓'; font-size: 10px; color: var(--bg); }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-meta {
    display: flex; gap: 8px; margin-top: 4px; align-items: center; flex-wrap: wrap;
  }

  .task-lane-tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 10px;
  }

  .tag-work { background: var(--work-bg); color: var(--work); }
  .tag-masters { background: var(--masters-bg); color: var(--masters); }
  .tag-reno { background: var(--reno-bg); color: var(--reno); }
  .tag-wedding { background: var(--wedding-bg); color: var(--wedding); }

  .task-date {
    font-size: 10px;
    color: var(--muted);
  }

  .task-overdue { color: var(--work) !important; font-weight: 500; }

  .task-del {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .task-card:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--work); }

  /* LANE VIEW */
  .lane-columns {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }

  .lane-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .lane-col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .lane-col-title {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 600;
    font-style: italic;
  }

  .lane-count {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .empty-state {
    font-size: 11px;
    color: var(--muted);
    padding: 1rem 0;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin: 1rem 0 0.5rem;
  }

  .overdue-banner {
    background: #FBF0EC;
    border: 1px solid var(--work-border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--work);
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }

  @media (max-width: 600px) {
    .add-form { grid-template-columns: 1fr; }
    .lane-columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Life Tracker</h1>
  <p>Jun 2025 — Jan 2026 · Work · Masters · Renovation · Wedding</p>
</header>

<!-- ADD TASK -->
<div class="add-form">
  <div class="form-group" style="grid-column: 1/-1">
    <label>Task</label>
    <input type="text" id="task-input" placeholder="What needs to get done?" />
  </div>
  <div class="form-group">
    <label>Lane</label>
    <select id="lane-select" class="lane-select">
      <option value="work">Work</option>
      <option value="masters">Masters</option>
      <option value="reno">Renovation</option>
      <option value="wedding">Wedding</option>
    </select>
  </div>
  <div class="form-group">
    <label>Due date</label>
    <input type="date" id="date-input" class="date-input" />
  </div>
  <button class="add-btn" onclick="addTask()">+ Add</button>
</div>

<!-- VIEW TABS -->
<div class="controls">
  <button class="tab-btn active" id="tab-week" onclick="switchView('week')">By Week</button>
  <button class="tab-btn" id="tab-lane" onclick="switchView('lane')">By Lane</button>
</div>

<!-- WEEK VIEW -->
<div id="view-week">
  <div class="week-nav">
    <button onclick="prevWeek()">← Prev</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="nextWeek()">Next →</button>
  </div>
  <div class="week-summary" id="week-summary"></div>
  <div id="overdue-banner"></div>
  <div id="week-tasks"></div>
</div>

<!-- LANE VIEW -->
<div id="view-lane" style="display:none">
  <div class="lane-columns" id="lane-columns"></div>
</div>

<script>
const STORAGE_KEY = 'life_tracker_tasks_v2';

let tasks = [];
let currentWeekOffset = 0;
let currentView = 'week';

async function loadTasks() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) tasks = JSON.parse(r.value);
  } catch(e) { tasks = []; }
  render();
}

async function saveTasks() {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
}

function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function formatDate(d) {
  return d.toLocaleDateString('en-SG', { day: 'numeric', month: 'short' });
}

function parseDate(s) {
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function isOverdue(task) {
  if (!task.due || task.done) return false;
  const d = parseDate(task.due);
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

function addTask() {
  const text = document.getElementById('task-input').value.trim();
  const lane = document.getElementById('lane-select').value;
  const due = document.getElementById('date-input').value;
  if (!text) return;
  tasks.push({ id: Date.now(), text, lane, due, done: false });
  document.getElementById('task-input').value = '';
  saveTasks();
  render();
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); render();
}

function switchView(v) {
  currentView = v;
  document.getElementById('view-week').style.display = v === 'week' ? '' : 'none';
  document.getElementById('view-lane').style.display = v === 'lane' ? '' : 'none';
  document.getElementById('tab-week').classList.toggle('active', v === 'week');
  document.getElementById('tab-lane').classList.toggle('active', v === 'lane');
}

function prevWeek() { currentWeekOffset--; renderWeek(); }
function nextWeek() { currentWeekOffset++; renderWeek(); }

function taskCard(t, showLane) {
  const d = parseDate(t.due);
  const overdue = isOverdue(t);
  const dateStr = d ? (overdue ? `⚠ Overdue · ${formatDate(d)}` : `Due ${formatDate(d)}`) : 'No due date';
  return `
    <div class="task-card ${t.lane} ${t.done ? 'done' : ''}">
      <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleDone(${t.id})"></div>
      <div class="task-body">
        <div class="task-text">${t.text}</div>
        <div class="task-meta">
          ${showLane ? `<span class="task-lane-tag tag-${t.lane}">${{work:'Work',masters:'Masters',reno:'Renovation',wedding:'Wedding'}[t.lane]}</span>` : ''}
          <span class="task-date ${overdue && !t.done ? 'task-overdue' : ''}">${dateStr}</span>
        </div>
      </div>
      <button class="task-del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
    </div>`;
}

function renderWeek() {
  const ws = getWeekStart(currentWeekOffset);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);

  document.getElementById('week-label').textContent =
    `${formatDate(ws)} – ${formatDate(we)}`;

  // tasks due this week
  const weekTasks = tasks.filter(t => {
    const d = parseDate(t.due);
    if (!d) return false;
    return d >= ws && d <= we;
  });

  // overdue
  const overdue = tasks.filter(t => isOverdue(t));

  // banner
  const banner = document.getElementById('overdue-banner');
  if (overdue.length > 0 && currentWeekOffset === 0) {
    banner.innerHTML = `<div class="overdue-banner">⚠ ${overdue.length} overdue task${overdue.length > 1 ? 's' : ''} — check your other weeks</div>`;
  } else { banner.innerHTML = ''; }

  // summary pills
  const lanes = ['work','masters','reno','wedding'];
  const laneLabels = {work:'Work',masters:'Masters',reno:'Renovation',wedding:'Wedding'};
  const summary = document.getElementById('week-summary');
  summary.innerHTML = lanes.map(l => {
    const c = weekTasks.filter(t => t.lane === l && !t.done).length;
    return c > 0 ? `<span class="lane-pill pill-${l}">${laneLabels[l]} · ${c}</span>` : '';
  }).join('');

  const container = document.getElementById('week-tasks');
  if (weekTasks.length === 0) {
    container.innerHTML = `<div class="empty-state">No tasks due this week</div>`;
    return;
  }

  // sort by date then lane
  const sorted = [...weekTasks].sort((a,b) => {
    const da = parseDate(a.due), db = parseDate(b.due);
    return da - db;
  });

  const pending = sorted.filter(t => !t.done);
  const done = sorted.filter(t => t.done);

  let html = '';
  if (pending.length) html += pending.map(t => taskCard(t, true)).join('');
  if (done.length) {
    html += `<div class="section-label">Done</div>`;
    html += done.map(t => taskCard(t, true)).join('');
  }
  container.innerHTML = html;
}

function renderLane() {
  const lanes = ['work','masters','reno','wedding'];
  const laneLabels = {work:'Work',masters:'Masters',reno:'Renovation',wedding:'Wedding'};
  const container = document.getElementById('lane-columns');
  container.innerHTML = lanes.map(l => {
    const lt = tasks.filter(t => t.lane === l);
    const pending = lt.filter(t => !t.done).sort((a,b) => {
      const da = parseDate(a.due), db = parseDate(b.due);
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return da - db;
    });
    const done = lt.filter(t => t.done);
    const total = pending.length;
    return `
      <div class="lane-col">
        <div class="lane-col-header">
          <span class="lane-col-title" style="color:var(--${l})">${laneLabels[l]}</span>
          <span class="lane-count">${total} open</span>
        </div>
        ${pending.length === 0 && done.length === 0 ? '<div class="empty-state">No tasks yet</div>' : ''}
        ${pending.map(t => taskCard(t, false)).join('')}
        ${done.length > 0 ? `<div class="section-label">Done</div>${done.map(t => taskCard(t, false)).join('')}` : ''}
      </div>`;
  }).join('');
}

function render() {
  renderWeek();
  renderLane();
}

// Set default date to today
const today = new Date();
document.getElementById('date-input').value = today.toISOString().split('T')[0];

loadTasks();
</script>
</body>
</html>
